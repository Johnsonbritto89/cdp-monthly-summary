const ini=n=>n.split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const ragC=r=>r==='Green'?'chip cg':r==='Amber'?'chip ca':'chip cr';
const stC=s=>s==='Won'?'chip cw':s==='In Progress'?'chip cp':s==='Lost'?'chip cl':'chip co';

function Donut({data,size=150,thick=20}){
  const[hov,setHov]=useState(-1);
  const r=size/2,inn=r-thick,sum=data.reduce((s,d)=>s+d.value,0);
  let acc=0;
  const arcs=data.map((d,i)=>{
    const s0=acc/sum,e0=(acc+d.value)/sum;acc+=d.value;
    const a0=s0*Math.PI*2-Math.PI/2,a1=e0*Math.PI*2-Math.PI/2;
    const x0=r+r*Math.cos(a0),y0=r+r*Math.sin(a0),x1=r+r*Math.cos(a1),y1=r+r*Math.sin(a1);
    const xi0=r+inn*Math.cos(a0),yi0=r+inn*Math.sin(a0),xi1=r+inn*Math.cos(a1),yi1=r+inn*Math.sin(a1);
    return{...d,i,pct:(d.value/sum*100).toFixed(1),path:`M${x0} ${y0}A${r} ${r} 0 ${e0-s0>0.5?1:0} 1 ${x1} ${y1}L${xi1} ${yi1}A${inn} ${inn} 0 ${e0-s0>0.5?1:0} 0 ${xi0} ${yi0}Z`};
  });
  const ctr=hov>=0?arcs[hov]:null;
  return(
    <div className="drow">
      <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
          {arcs.map(a=><path key={a.i} d={a.path} fill={a.color} opacity={hov===-1||hov===a.i?1:0.25}
            onMouseEnter={()=>setHov(a.i)} onMouseLeave={()=>setHov(-1)} style={{transition:'opacity 140ms',cursor:'pointer'}}/>)}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',textAlign:'center'}}>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.03em',color:'var(--fg)',lineHeight:1}}>{ctr?ctr.value:sum}</div>
          <div style={{fontSize:9,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--fgm)',marginTop:5,fontWeight:700,maxWidth:size-30}}>{ctr?ctr.label:'Total'}</div>
        </div>
      </div>
      <div className="dleg">
        {arcs.map((a,i)=>(
          <div key={i} className={`li${hov!==-1&&hov!==i?' dim':''}`} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(-1)}>
            <span className="ls" style={{background:a.color}}/><span className="ll">{a.label}</span>
            <span className="lp">{a.pct}%</span><span className="ln">{a.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function StackedCols({data,keys,colors}){

          const isActive=s.certified+s.wip>0;
          return(
            <div key={i} style={{padding:'22px 24px',borderRight:i<3?'1px solid var(--bdr)':'0',background:isActive?'var(--sur2)':'var(--sur)',position:'relative'}}>
              <div style={{position:'absolute',top:16,right:16,width:7,height:7,borderRadius:'50%',background:isActive?s.color:'var(--bg3)'}}/>
              <div style={{fontSize:24,marginBottom:10}}>{s.icon}</div>
              <div style={{fontSize:38,fontWeight:800,letterSpacing:'-.03em',color:isActive?s.color:'var(--fgf)',lineHeight:1}}>{s.certified}</div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:isActive?s.color:'var(--fgf)',margin:'6px 0 8px'}}>{s.label}</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <span style={{fontSize:12,color:'var(--fgm)',fontWeight:500}}>Certified</span>
                {s.wip>0&&<span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:999,background:'var(--rab)',color:'var(--ra)'}}>{s.wip} WIP</span>}
              </div>
              {/* Stacked progress bar: certified + WIP + remaining */}
              <div style={{height:6,background:'var(--bg3)',borderRadius:999,overflow:'hidden',display:'flex'}}>
                <div style={{width:`${pct}%`,background:s.color,height:'100%',transition:'width .4s'}}/>
                <div style={{width:`${wipPct}%`,background:s.color,height:'100%',opacity:.35,transition:'width .4s'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <span style={{fontSize:11,color:'var(--fgm)',fontWeight:500}}>{s.desc}</span>
                <span style={{fontSize:12,fontWeight:700,color:isActive?s.color:'var(--fgf)'}}>{pct}%</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AppreciationsCard(){
  return(
    <div className="card">
      <div className="ch"><p className="ct">Appreciations</p><p className="cs">High-impact feedback this month</p></div>
      <div className="cb">
        {D.appreciations.length===0
          ?<div style={{fontSize:12,color:'var(--fgm)',textAlign:'center',padding:24}}>No appreciations recorded this month.</div>
          :<div style={{display:'grid',gap:10}}>{D.appreciations.map((a,i)=>(
            <div className="appc" key={i}><div className="apph"><span className={`av t${(i%4)+1}`}>{ini(a.to)}</span><div className="appm">To <b>{a.to}</b><br/><span>From {a.from}</span></div></div><div className="appn">"{a.note}"</div>
          </div>))}</div>}
      </div>
    </div>
  );
}

function FocusAreasCard(){
  return(
    <div className="card">
      <div className="ch"><p className="ct">Focus Areas</p></div>
      <div className="cb"><ul className="slist">{D.focusAreas.map((f,i)=><li key={i}><span className="nm">{i+1}</span><span>{f}</span></li>)}</ul></div>
    </div>
  );
}

function Overview(){
  const ragBreak=D.projects.reduce((acc,p)=>{acc[p.rag]=(acc[p.rag]||0)+1;return acc;},{});
  const ragData=Object.entries(ragBreak).map(([k,v])=>({label:k,value:v,color:k==='Green'?'var(--rg)':k==='Amber'?'var(--ra)':'var(--rr)'}));
  const tech={};D.projects.forEach(p=>{tech[p.stack]=(tech[p.stack]||0)+1;});
  const techData=Object.entries(tech).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const amkt={};D.projects.forEach(p=>{amkt[p.market]=(amkt[p.market]||0)+1;});
  const amktData=Object.entries(amkt).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const stage={};D.pipeline.forEach(p=>{stage[p.stage]=(stage[p.stage]||0)+1;});
  const stageData=Object.entries(stage).map(([k,v])=>({label:k,value:v,color:k==='Won'?'var(--rg)':k==='In Progress'?'var(--peri)':k==='Open'?'#6E7B8C':'var(--rr)'}));
  const pmkt={};D.pipeline.forEach(p=>{pmkt[p.market]=(pmkt[p.market]||0)+1;});
  const pmktData=Object.entries(pmkt).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const pri={};D.pipeline.forEach(p=>{pri[p.priority]=(pri[p.priority]||0)+1;});
  const priData=Object.entries(pri).map(([k,v])=>({label:k,value:v,color:k==='High'?'var(--rr)':k==='Medium'?'var(--ra)':'#6E7B8C'}));
  const ckKeys=['Adobe','Salesforce','SegmentCDP','Snowflake','TreasureData','Claude'];
  const ckColors=['#008287','#646ED2','#00D2E6','#FF5023','#AAFF6E','#8B5CF6'];
  return(
    <>
      <KPIStrip/>
      <div className="g">
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Project RAG Status</p><p className="cs">Active key projects</p></div><div className="cb"><Donut data={ragData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · Tech Stack</p><p className="cs">By platform</p></div><div className="cb"><Donut data={techData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · By Market</p><p className="cs">Geographic split</p></div><div className="cb"><Donut data={amktData}/></div></div></div>
      </div>
      <div className="g"><div className="c12"><ProjectsCard/></div></div>
      <div className="g">
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Stage</p><p className="cs">New project opportunities</p></div><div className="cb"><Donut data={stageData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Market</p><p className="cs">Geographic split</p></div><div className="cb"><Donut data={pmktData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Priority</p><p className="cs">High / Medium / Low</p></div><div className="cb"><Donut data={priData}/></div></div></div>
      </div>
      <div className="g"><div className="c12"><PipelineCard/></div></div>
      <div className="g">
        <div className="c4"><OverallCertsCard/></div>
        <div className="c8"><CertsByTechCard/></div>
      </div>
      <div className="g">
        <div className="c5"><div className="card"><div className="ch"><p className="ct">Certifications by Quarter</p></div><div className="cb"><StackedCols data={D.certsByQ} keys={ckKeys} colors={ckColors}/></div></div></div>
        <div className="c7"><PlannedCertsCard/></div>
      </div>
      <div className="g"><div className="c12"><AITrackCard/></div></div>
      <div className="g">
        <div className="c6"><TrainingsCard/></div>
        <div className="c6" style={{display:'grid',gap:16,gridTemplateRows:'auto auto'}}>
          <FocusAreasCard/><AppreciationsCard/>
        </div>
      </div>
    </>
  );
}

function App(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('cdp-theme')==='dark'}catch{return false}});
  const[tab,setTab]=useState('Overview');
  useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');try{localStorage.setItem('cdp-theme',dark?'dark':'light')}catch{};},[dark]);
  const TABS=['Overview','Projects','Pipeline','Certifications','AI Track','Initiatives & Actions'];
  const ckKeys=['Adobe','Salesforce','SegmentCDP','Snowflake','TreasureData','Claude'];
  const ckColors=['#008287','#646ED2','#00D2E6','#FF5023','#AAFF6E','#8B5CF6'];
  const makeDonuts=()=>{
    const ragBreak=D.projects.reduce((acc,p)=>{acc[p.rag]=(acc[p.rag]||0)+1;return acc;},{});
    const ragData=Object.entries(ragBreak).map(([k,v])=>({label:k,value:v,color:k==='Green'?'var(--rg)':k==='Amber'?'var(--ra)':'var(--rr)'}));
    const tech={};D.projects.forEach(p=>{tech[p.stack]=(tech[p.stack]||0)+1;});
    const techData=Object.entries(tech).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
    const amkt={};D.projects.forEach(p=>{amkt[p.market]=(amkt[p.market]||0)+1;});
    const amktData=Object.entries(amkt).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
    const stage={};D.pipeline.forEach(p=>{stage[p.stage]=(stage[p.stage]||0)+1;});
    const stageData=Object.entries(stage).map(([k,v])=>({label:k,value:v,color:k==='Won'?'var(--rg)':k==='In Progress'?'var(--peri)':k==='Open'?'#6E7B8C':'var(--rr)'}));
    const pmkt={};D.pipeline.forEach(p=>{pmkt[p.market]=(pmkt[p.market]||0)+1;});
    const pmktData=Object.entries(pmkt).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
    const pri={};D.pipeline.forEach(p=>{pri[p.priority]=(pri[p.priority]||0)+1;});
    const priData=Object.entries(pri).map(([k,v])=>({label:k,value:v,color:k==='High'?'var(--rr)':k==='Medium'?'var(--ra)':'#6E7B8C'}));
    return{ragData,techData,amktData,stageData,pmktData,priData};
  };
  const d=makeDonuts();
  return(
    <>
      <div className="bar">
        <div className="blogo">DGS · CDP</div>
        <span className="bey">Monthly Summary</span>
        <div className="btabs">{TABS.map(t=><button key={t} className={`btab${tab===t?' on':''}`} onClick={()=>setTab(t)}>{t}</button>)}</div>
        <div className="brt">
          <div className="period"><span className="dot"/>{D.month} {D.year}</div>
          <button className="ibtn" onClick={()=>setDark(!dark)} title="Toggle dark / light mode">
            {dark
              ?<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              :<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>}
          </button>
        </div>
      </div>
      <div className="shell">
        <div className="ph">
          <div>
            <span className="bey" style={{display:'block',marginBottom:8}}>CDP Team · Monthly Summary</span>
            <h1>{D.month} {D.year}</h1>
            <div className="sub">Snapshot of delivery, pipeline, certifications and team development</div>
          </div>
          <div className="chips">
            <span className="chip cg"><span className="dot"/>15 green</span>
            <span className="chip ca"><span className="dot"/>1 amber</span>
            <span className="chip cn">47 team</span>
          </div>
        </div>

        {tab==='Overview'&&<Overview/>}

        {tab==='Projects'&&<>
          <div className="g">
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Project RAG Status</p><p className="cs">Active key projects</p></div><div className="cb"><Donut data={d.ragData}/></div></div></div>
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · Tech Stack</p><p className="cs">By platform</p></div><div className="cb"><Donut data={d.techData}/></div></div></div>
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · By Market</p><p className="cs">Geographic split</p></div><div className="cb"><Donut data={d.amktData}/></div></div></div>
          </div>
          <div className="g"><div className="c12"><ProjectsCard/></div></div>
        </>}

        {tab==='Pipeline'&&<>
          <div className="g">
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Stage</p><p className="cs">New project opportunities</p></div><div className="cb"><Donut data={d.stageData}/></div></div></div>
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Market</p><p className="cs">Geographic split</p></div><div className="cb"><Donut data={d.pmktData}/></div></div></div>
            <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Priority</p><p className="cs">High / Medium / Low</p></div><div className="cb"><Donut data={d.priData}/></div></div></div>
          </div>
          <div className="g"><div className="c12"><PipelineCard/></div></div>
        </>}

        {tab==='Certifications'&&<>
          <div className="g">
            <div className="c4"><OverallCertsCard/></div>
            <div className="c8"><CertsByTechCard/></div>
          </div>
          <div className="g">
            <div className="c5"><div className="card"><div className="ch"><p className="ct">Certifications by Quarter</p></div><div className="cb"><StackedCols data={D.certsByQ} keys={ckKeys} colors={ckColors}/></div></div></div>
            <div className="c7"><PlannedCertsCard/></div>
          </div>
        </>}

        {tab==='AI Track'&&<div className="g"><div className="c12"><AITrackCard/></div></div>}

        {tab==='Initiatives & Actions'&&<>
          <div className="g">
            <div className="c6"><TrainingsCard/></div>
            <div className="c6" style={{display:'grid',gap:16,gridTemplateRows:'auto auto'}}>
              <FocusAreasCard/><AppreciationsCard/>
            </div>
          </div>
        </>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
