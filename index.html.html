// ── Month Switcher ────────────────────────────────────────
function MonthSwitcher({selected,onChange}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  return(
    <div style={{position:'relative'}} ref={ref}>
      <button onClick={()=>setOpen(!open)} style={{display:'inline-flex',alignItems:'center',gap:7,height:32,padding:'0 12px',border:'1px solid var(--bdr)',borderRadius:8,background:'var(--sur)',fontSize:12,fontWeight:700,color:'var(--fg)',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'var(--teal)',flexShrink:0}}/>
        {selected}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:open?'rotate(180deg)':'none',transition:'transform .14s',flexShrink:0}}><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open&&<div style={{position:'absolute',top:'calc(100% + 6px)',right:0,background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.14)',minWidth:170,zIndex:200,overflow:'hidden'}}>
        {MONTHS.map(m=>(
          <div key={m} onClick={()=>{onChange(m);setOpen(false);}}
            style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',fontSize:12,fontWeight:600,cursor:'pointer',color:m===selected?'var(--teal)':'var(--fg2)',background:m===selected?'var(--rgb)':'transparent',transition:'background .12s'}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:m===selected?'var(--teal)':'var(--bdr)',flexShrink:0}}/>
            {m}
            {m===selected&&<span style={{marginLeft:'auto',fontSize:10}}>✓</span>}
          </div>
        ))}
      </div>}
    </div>
  );
}

// ── Donut ─────────────────────────────────────────────────
function Donut({data,size=150,thick=20}){
  const[hov,setHov]=useState(-1);
  const r=size/2,inn=r-thick,sum=data.reduce((s,d)=>s+d.value,0);
  if(!sum) return <div style={{height:size,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--fgf)',fontSize:12}}>No data</div>;
  let acc=0;
  const arcs=data.map((d,i)=>{
    const s0=acc/sum,e0=(acc+d.value)/sum;acc+=d.value;
    const a0=s0*Math.PI*2-Math.PI/2,a1=e0*Math.PI*2-Math.PI/2;
    const x0=r+r*Math.cos(a0),y0=r+r*Math.sin(a0),x1=r+r*Math.cos(a1),y1=r+r*Math.sin(a1);
    const xi0=r+inn*Math.cos(a0),yi0=r+inn*Math.sin(a0),xi1=r+inn*Math.cos(a1),yi1=r+inn*Math.sin(a1);
    return{...d,i,pct:(d.value/sum*100).toFixed(1),path:`M${x0} ${y0}A${r} ${r} 0 ${e0-s0>0.5?1:0} 1 ${x1} ${y1}L${xi1} ${yi1}A${inn} ${inn} 0 ${e0-s0>0.5?1:0} 0 ${xi0} ${yi0}Z`};
  });
  const ctr=hov>=0?arcs[hov]:null;
  return(
    <div className="drow">
      <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
          {arcs.map(a=><path key={a.i} d={a.path} fill={a.color} opacity={hov===-1||hov===a.i?1:0.25}
            onMouseEnter={()=>setHov(a.i)} onMouseLeave={()=>setHov(-1)} style={{transition:'opacity 140ms',cursor:'pointer'}}/>)}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',textAlign:'center'}}>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.03em',color:'var(--fg)',lineHeight:1}}>{ctr?ctr.value:sum}</div>
          <div style={{fontSize:9,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--fgm)',marginTop:5,fontWeight:700,maxWidth:size-30}}>{ctr?ctr.label:'Total'}</div>
        </div>
      </div>
      <div className="dleg">{arcs.map((a,i)=>(
        <div key={i} className={`li${hov!==-1&&hov!==i?' dim':''}`} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(-1)}>
          <span className="ls" style={{background:a.color}}/><span className="ll">{a.label}</span>
          <span className="lp">{a.pct}%</span><span className="ln">{a.value}</span>
        </div>
      ))}</div>
    </div>
  );
}

// ── Stacked Cols ──────────────────────────────────────────
function StackedCols({data,keys,colors}){
  const max=Math.max(...data.map(d=>keys.reduce((s,k)=>s+(d[k]||0),0)));
  const labels=['Adobe','Salesforce','Segment CDP','Snowflake','Treasure Data','Claude'];
  return(
    <>
      <div className="col-chart">
        {data.map((d,i)=>{const tot=keys.reduce((s,k)=>s+(d[k]||0),0);const ht=max?tot/max*160:0;return(
          <div className="col-g" key={i}>
            <div style={{fontSize:10,fontWeight:800,color:'var(--fg)',minHeight:12}}>{tot>0?tot:''}</div>
            <div className="col-stk" style={{height:ht}}>{keys.map((k,j)=>{const v=d[k]||0,h=max?v/max*160:0;return v>0?<div key={j} style={{width:36,height:h,background:colors[j]}}/>:null;})}</div>
          </div>
        );})}
      </div>
      <div className="col-x">{data.map((d,i)=><span key={i}>{d.q}</span>)}</div>
      <div className="cleg">{labels.map((k,i)=><span key={i}><span className="dot" style={{background:colors[i]}}/>{k}</span>)}</div>
    </>
  );
}

// ── KPI Strip ─────────────────────────────────────────────
function KPIDelta({curr,prev}){
  if(prev===undefined||prev===null)return null;
  const d=curr-prev;
  if(d===0)return null;
  const up=d>0,col=up?'#22c55e':'#f87171',arrow=up?'▲':'▼';
  return <span style={{display:'inline-flex',alignItems:'center',gap:2,fontSize:10,fontWeight:700,color:col,marginLeft:6,lineHeight:1}}>{arrow}{Math.abs(d)}</span>;
}

// ── Certs by Category — vertical grouped bar chart ────────
function CertsByCategoryCard({D}){
  if(!D.certsByCategory) return null;
  const[hov,setHov]=useState(null);
  const data=D.certsByCategory;
  const allCats=data.flatMap(d=>d.categories);
  const maxCount=Math.max(...allCats.map(c=>c.count));
  const BAR_W=42, BAR_GAP=9, GRP_GAP=36, CHART_H=200, LABEL_H=90;
  // Compute total SVG width
  let x=0;
  const groups=data.map(tech=>{
    const startX=x;
    const bars=tech.categories.map((cat,ci)=>{
      const bx=x; x+=BAR_W+BAR_GAP; return{...cat,x:bx};
    });
    x=x-BAR_GAP+GRP_GAP; // remove last gap, add group gap
    return{...tech,bars,startX,endX:x-GRP_GAP,midX:(startX+(x-GRP_GAP))/2};
  });
  const totalW=x-GRP_GAP+20;
  return(
    <div className="card">
      <div className="ch">
        <div><p className="ct">Active Certifications by Category — CDP Platforms</p><p className="cs">Individual bars per category · Active certs only · Hover for details</p></div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'4px 10px'}}>
          {data.map((d,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'var(--fg2)',fontWeight:600}}>
            <span style={{width:10,height:10,borderRadius:3,background:d.categories[0]?.color||'#888',display:'inline-block'}}/>{d.tech}
          </span>)}
        </div>
      </div>
      <div className="cb flush" style={{paddingBottom:4}}>
        <svg viewBox={`0 0 ${totalW+10} ${CHART_H+LABEL_H+20}`} style={{width:'100%',height:'auto',display:'block'}}>
          {/* Y-axis grid lines */}
          {[0,0.25,0.5,0.75,1].map((pct,i)=>{
            const y=10+(1-pct)*CHART_H;
            const val=Math.round(pct*maxCount);
            return(
              <g key={i}>
                <line x1="30" y1={y} x2={totalW+10} y2={y} stroke="var(--bdr)" strokeWidth="1" strokeDasharray={pct===0?'0':'3,3'}/>
                <text x="24" y={y+4} fontSize="9" fill="var(--fgm)" textAnchor="end" fontFamily="inherit">{val}</text>
              </g>
            );
          })}
          {/* Bars */}
          {groups.map((grp,gi)=>
            grp.bars.map((bar,bi)=>{
              const barH=maxCount?bar.count/maxCount*CHART_H:0;
              const bx=bar.x+30;
              const by=10+CHART_H-barH;
              const isHov=hov&&hov.tech===grp.tech&&hov.cat===bar.name;
              return(
                <g key={`${gi}-${bi}`}
                  onMouseEnter={()=>setHov({tech:grp.tech,cat:bar.name,count:bar.count,x:bx+BAR_W/2,y:by})}
                  onMouseLeave={()=>setHov(null)}
                  style={{cursor:'default'}}>
                  <rect x={bx} y={by} width={BAR_W} height={Math.max(barH,1)}
                    fill={bar.color} rx="3"
                    opacity={hov&&!isHov?0.45:1}
                    style={{transition:'opacity .14s'}}/>
                  <text x={bx+BAR_W/2} y={by-4} fontSize="9" fill="var(--fg)" textAnchor="middle"
                    fontWeight="700" fontFamily="inherit">{bar.count}</text>
                </g>
              );
            })
          )}
          {/* Tech group labels */}
          {groups.map((grp,gi)=>{
            const lineY=10+CHART_H+8;
            return(
              <g key={gi}>
                <line x1={grp.startX+30} y1={lineY} x2={grp.endX+30} y2={lineY} stroke={grp.categories[0]?.color||'#888'} strokeWidth="2" strokeLinecap="round"/>
                <text x={grp.midX+30} y={lineY+16} fontSize="11" fill="var(--fg)" textAnchor="middle"
                  fontWeight="700" fontFamily="inherit">{grp.tech}</text>
              </g>
            );
          })}
          {/* Category labels (rotated) */}
          {groups.map((grp,gi)=>
            grp.bars.map((bar,bi)=>{
              const bx=bar.x+30+BAR_W/2;
              const ly=10+CHART_H+30;
              const shortName=bar.name.length>14?bar.name.replace('Adobe ','').replace('Salesforce ','').replace('SF ','SF ').replace('SnowPro ','').replace('CDP for ','').replace('Impl ',''):(bar.name);
              return(
                <text key={`l-${gi}-${bi}`} x={bx} y={ly}
                  fontSize="8" fill="var(--fgm)" textAnchor="end"
                  fontFamily="inherit"
                  transform={`rotate(-45,${bx},${ly})`}>{shortName}</text>
              );
            })
          )}
          {/* Tooltip */}
          {hov&&(()=>{
            const tw=160,th=38,tx=Math.min(hov.x-tw/2,totalW-tw),ty=Math.max(hov.y-th-8,6);
            return(
              <g>
                <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="var(--sur)" stroke="var(--bdr)" strokeWidth="1"
                  style={{filter:'drop-shadow(0 2px 8px rgba(0,0,0,.12))'}}/>
                <text x={tx+10} y={ty+14} fontSize="10" fill="var(--fgm)" fontFamily="inherit">{hov.tech}</text>
                <text x={tx+10} y={ty+28} fontSize="11" fontWeight="700" fill="var(--fg)" fontFamily="inherit">{hov.cat}: {hov.count}</text>
              </g>
            );
          })()}
        </svg>
      </div>
    </div>
  );
}

// ── Build donut data ──────────────────────────────────────
function buildDonuts(D){
  const rb=D.projects.reduce((a,p)=>{a[p.rag]=(a[p.rag]||0)+1;return a;},{});
  const ragData=Object.entries(rb).map(([k,v])=>({label:k,value:v,color:k==='Green'?'var(--rg)':k==='Amber'?'var(--ra)':'var(--rr)'}));
  const t={};D.projects.forEach(p=>{t[p.stack]=(t[p.stack]||0)+1;});
  const techData=Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const am={};D.projects.forEach(p=>{am[p.market]=(am[p.market]||0)+1;});
  const amktData=Object.entries(am).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const sg={};D.pipeline.forEach(p=>{sg[p.stage]=(sg[p.stage]||0)+1;});
  const stageData=Object.entries(sg).map(([k,v])=>({label:k,value:v,color:k==='Won'?'var(--rg)':k==='In Progress'?'var(--peri)':k==='Open'?'#6E7B8C':'var(--rr)'}));
  const pm={};D.pipeline.forEach(p=>{pm[p.market]=(pm[p.market]||0)+1;});
  const pmktData=Object.entries(pm).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>({label:k,value:v,color:TC[i%TC.length]}));
  const pr={};D.pipeline.forEach(p=>{pr[p.priority]=(pr[p.priority]||0)+1;});
  const priData=Object.entries(pr).map(([k,v])=>({label:k,value:v,color:k==='High'?'var(--rr)':k==='Medium'?'var(--ra)':'#6E7B8C'}));
  return{ragData,techData,amktData,stageData,pmktData,priData};
}

// ── Overview ──────────────────────────────────────────────
function Overview({D}){
  const dn=buildDonuts(D);
  const ck=['Adobe','Salesforce','SegmentCDP','Snowflake','TreasureData','Claude'];
  const cc=['#008287','#646ED2','#00D2E6','#FF5023','#AAFF6E','#8B5CF6'];
  return(<>
    <KPIStrip D={D}/>
    <div className="g">
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Project RAG Status</p></div><div className="cb"><Donut data={dn.ragData}/></div></div></div>
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · Tech Stack</p></div><div className="cb"><Donut data={dn.techData}/></div></div></div>
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · By Market</p></div><div className="cb"><Donut data={dn.amktData}/></div></div></div>
    </div>
    <div className="g"><div className="c12"><ProjectsCard D={D}/></div></div>
    <div className="g">
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Stage</p></div><div className="cb"><Donut data={dn.stageData}/></div></div></div>
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Market</p></div><div className="cb"><Donut data={dn.pmktData}/></div></div></div>
      <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Priority</p></div><div className="cb"><Donut data={dn.priData}/></div></div></div>
    </div>
    <div className="g"><div className="c12"><PipelineCard D={D}/></div></div>
    <div className="g"><div className="c4"><OverallCertsCard D={D}/></div><div className="c8"><CertsByTechCard D={D}/></div></div>
    {D.certsByCategory&&<div className="g"><div className="c12"><CertsByCategoryCard D={D}/></div></div>}
    <div className="g">
      <div className="c5"><div className="card"><div className="ch"><p className="ct">Certifications by Quarter</p></div><div className="cb"><StackedCols data={D.certsByQ} keys={ck} colors={cc}/></div></div></div>
      <div className="c7"><PlannedCertsCard D={D}/></div>
    </div>
    <div className="g"><div className="c12"><AITrackCard D={D}/></div></div>
    <div className="g">
      <div className="c6"><TrainingsCard D={D}/></div>
      <div className="c6" style={{display:'grid',gap:16,gridTemplateRows:'auto auto'}}>
        <FocusAreasCard D={D}/><AppreciationsCard D={D}/>
      </div>
    </div>
  </>);
}

// ── App ───────────────────────────────────────────────────
function App(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('cdp-theme')==='dark'}catch{return false}});
  const[tab,setTab]=useState('Overview');
  const[selMonth,setSelMonth]=useState(MONTHS[MONTHS.length-1]);
  const D=ALL_DATA[selMonth];
  const ck=['Adobe','Salesforce','SegmentCDP','Snowflake','TreasureData','Claude'];
  const cc=['#008287','#646ED2','#00D2E6','#FF5023','#AAFF6E','#8B5CF6'];
  useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');try{localStorage.setItem('cdp-theme',dark?'dark':'light')}catch{};},[dark]);
  const handleMonth=m=>{setSelMonth(m);setTab('Overview');};
  const TABS=['Overview','Projects','Pipeline','Certifications','AI Track','Initiatives & Actions'];
  const dn=buildDonuts(D);
  const amber=D.projects.filter(p=>p.rag==='Amber'||p.rag==='Red').length;
  return(<>
    <div className="bar">
      <div className="blogo">DGS · CDP</div>
      <span className="bey">Monthly Summary</span>
      <div className="btabs">{TABS.map(t=><button key={t} className={`btab${tab===t?' on':''}`} onClick={()=>setTab(t)}>{t}</button>)}</div>
      <div className="brt">
        <MonthSwitcher selected={selMonth} onChange={handleMonth}/>
        <button className="ibtn" onClick={()=>setDark(!dark)} title="Toggle dark/light">
          {dark?<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>}
        </button>
      </div>
    </div>
    <div className="shell">
      <div className="ph">
        <div>
          <span className="bey" style={{display:'block',marginBottom:8}}>CDP Team · Monthly Summary</span>
          <h1>{D.month} {D.year}</h1>
          <div className="sub">Snapshot of delivery, pipeline, certifications and team development</div>
        </div>
        {tab==='Overview'&&<div className="chips">
          <span className="chip cg"><span className="dot"/>{D.kpis.greenStatus} green</span>
          <span className="chip ca"><span className="dot"/>{amber} at risk</span>
          <span className="chip cn">{D.kpis.teamStrength} team</span>
        </div>}
      </div>
      {tab==='Overview'&&<Overview D={D}/>}
      {tab==='Projects'&&<><div className="g">
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Project RAG Status</p></div><div className="cb"><Donut data={dn.ragData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · Tech Stack</p></div><div className="cb"><Donut data={dn.techData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Active Projects · By Market</p></div><div className="cb"><Donut data={dn.amktData}/></div></div></div>
      </div><div className="g"><div className="c12"><ProjectsCard D={D} defaultOpen={true}/></div></div></>}
      {tab==='Pipeline'&&<><div className="g">
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Stage</p></div><div className="cb"><Donut data={dn.stageData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Market</p></div><div className="cb"><Donut data={dn.pmktData}/></div></div></div>
        <div className="c4"><div className="card"><div className="ch"><p className="ct">Pipeline · By Priority</p></div><div className="cb"><Donut data={dn.priData}/></div></div></div>
      </div><div className="g"><div className="c12"><PipelineCard D={D} defaultOpen={true}/></div></div></>}
      {tab==='Certifications'&&<>
        <div className="g"><div className="c4"><OverallCertsCard D={D}/></div><div className="c8"><CertsByTechCard D={D}/></div></div>
        {D.certsByCategory&&<div className="g"><div className="c12"><CertsByCategoryCard D={D}/></div></div>}
        <div className="g">
          <div className="c5"><div className="card"><div className="ch"><p className="ct">Certifications by Quarter</p></div><div className="cb"><StackedCols data={D.certsByQ} keys={ck} colors={cc}/></div></div></div>
          <div className="c7"><PlannedCertsCard D={D}/></div>
        </div>
      </>}
      {tab==='AI Track'&&<div className="g"><div className="c12"><AITrackCard D={D}/></div></div>}
      {tab==='Initiatives & Actions'&&<div className="g">
        <div className="c6"><TrainingsCard D={D}/></div>
        <div className="c6" style={{display:'grid',gap:16,gridTemplateRows:'auto auto'}}>
          <FocusAreasCard D={D}/><AppreciationsCard D={D}/>
        </div>
      </div>}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
